services:
  db:
    image: postgres:15-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cyworld} -d ${POSTGRES_DB:-cyworld}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cyworld-net

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cyworld}:${POSTGRES_PASSWORD:-cyworld1234}@db:5432/${POSTGRES_DB:-cyworld}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cyworld-net

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - cyworld-net

volumes:
  pgdata:

networks:
  cyworld-net:
    driver: bridge
